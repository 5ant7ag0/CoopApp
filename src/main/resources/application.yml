spring:
  application:
    name: backend-core

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/core_cooperativa?stringtype=unspecified}
    username: ${DB_USERNAME:core_admin}
    password: ${DB_PASSWORD:CoopSF2026!}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
          fetch_size: 100
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api/v1

app:
  jwt:
    secret: ${APP_JWT_SECRET}
  s3:
    endpoint: ${S3_ENDPOINT:}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
    bucket-name: ${S3_BUCKET_NAME:}
    region: ${S3_REGION:us-east-1}
    public-url-prefix: ${S3_PUBLIC_URL_PREFIX:}

resend:
  api-key: ${RESEND_API_KEY:}
  from-email: ${RESEND_FROM_EMAIL:info@coop.istechec.com}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
